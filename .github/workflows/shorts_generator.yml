name: Viral Shorts Generator

on:
  schedule:
    - cron: '0 */6 * * *'   # Her 6 saatte bir
  workflow_dispatch:         # Manuel tetikleme

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4

      - name: 🐍 Python ortamını kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🎞️ FFmpeg ve bağımlılıkları yükle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔐 Gizli anahtarları yapılandır
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
        run: |
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" > .env
          echo "${CLIENT_SECRETS_JSON}" > client_secrets.json
          if [ -n "${TOKEN_PICKLE_BASE64}" ]; then
            echo "${TOKEN_PICKLE_BASE64}" | base64 -d > token.pickle
          fi

      - name: 🤖 Botu çalıştır
        run: python main.py
