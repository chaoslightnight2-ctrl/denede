name: Viral Shorts Generator

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'runtime-status/**'
      - 'generated-videos/**'
  schedule:
    # 00:10 Turkey time = 21:10 UTC
    - cron: '10 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4

      - name: 🐍 Python ortamını kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup secrets
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" > .env
          echo "YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}" >> .env
          echo "${CLIENT_SECRETS_JSON}" > client_secrets.json

      - name: 🤖 4 Türkçe Shorts üret ve zamanlı yayınla
        id: run_bot
        continue-on-error: true
        run: python daily_batch_runner.py

      - name: 📝 Durum dosyası oluştur
        if: always()
        run: |
          mkdir -p runtime-status
          echo "# Last run" > runtime-status/last-run.md
          echo "result=${{ steps.run_bot.outcome }}" >> runtime-status/last-run.md
          echo "run_id=${GITHUB_RUN_ID}" >> runtime-status/last-run.md
          echo "commit=${GITHUB_SHA}" >> runtime-status/last-run.md
          echo "video=$(test -f generated-videos/latest_short.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "video_0600=$(test -f generated-videos/short_0600.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "video_1200=$(test -f generated-videos/short_1200.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "video_1800=$(test -f generated-videos/short_1800.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "video_2300=$(test -f generated-videos/short_2300.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "thumbnail=$(test -f generated-videos/latest_thumbnail.jpg && echo yes || echo no)" >> runtime-status/last-run.md
          echo "meta=$(test -f generated-videos/latest_meta.json && echo yes || echo no)" >> runtime-status/last-run.md
          echo "batch_manifest=$(test -f generated-videos/daily_batch_manifest.json && echo yes || echo no)" >> runtime-status/last-run.md
          echo "voice=$(test -f voiceover.mp3 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "log=$(test -f bot.log && echo yes || echo no)" >> runtime-status/last-run.md

      - name: Commit generated video and status
        if: always()
        continue-on-error: true
        uses: EndBug/add-and-commit@v9
        with:
          add: 'generated-videos runtime-status'
          message: 'ci: save daily scheduled shorts batch [skip ci]'
          default_author: github_actions
          pull: '--rebase --autostash'

      - name: 📦 Logları ve çıktıları sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-generator-output
          path: |
            bot.log
            final_shorts.mp4
            voiceover.mp3
            thumbnail.jpg
            generated-videos/*.mp4
            generated-videos/*.jpg
            generated-videos/*.gif
            generated-videos/*.json
            generated-videos/*.txt
            runtime-status/last-run.md
            runtime-status/video-meta.json
          if-no-files-found: ignore

      - name: Fail workflow if bot failed
        if: steps.run_bot.outcome != 'success'
        run: exit 1
