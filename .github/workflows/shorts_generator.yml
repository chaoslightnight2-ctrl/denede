name: Viral Shorts Generator

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'   # Her 6 saatte bir
  workflow_dispatch:         # Manuel tetikleme

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4

      - name: 🐍 Python ortamını kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick
          # ImageMagick güvenlik politikasını düzelt (metin yazmaya izin ver)
          sudo sed -i 's/rights="none"/rights="read|write"/g' /etc/ImageMagick-6/policy.xml
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup secrets
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" > .env
          echo "YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}" >> .env
          echo "${CLIENT_SECRETS_JSON}" > client_secrets.json

      - name: 🤖 Botu çalıştır
        run: python main.py
