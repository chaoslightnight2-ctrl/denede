name: Viral Shorts Generator

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'runtime-status/**'
      - 'generated-videos/**'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4

      - name: 🐍 Python ortamını kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup secrets
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" > .env
          echo "YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}" >> .env
          echo "${CLIENT_SECRETS_JSON}" > client_secrets.json

      - name: 🤖 Botu çalıştır
        id: run_bot
        continue-on-error: true
        run: |
          python - <<'PY'
          import asyncio
          import random
          import re
          import turkish_upload_runner as runner

          SCENARIOS = {
              "Şok Edici Psikolojik Gerçekler": ["tanıdıklık yanılgısı", "zihnin boşluk doldurması", "karar yorgunluğu", "sessiz sosyal baskı"],
              "Bilinmeyen İnsan Davranışları": ["kalabalıkta sorumluluk dağılması", "erteleyerek öncelik gösterme", "ilk izlenim tuzağı", "taklit davranışları"],
              "Çözülememiş Tarihi Gizemler": ["unutulmuş kayıtlar", "kaybolan topluluklar", "okunamayan semboller", "yarım kalan keşifler"],
              "Uzayın Korkunç Sırları": ["görünmeyen evren", "zamanın bükülmesi", "yıldızların ölümü", "kozmik sessizlik"],
              "Günlük Hayatta Stoacı Felsefe": ["tepkiyi seçmek", "kontrol ayrımı", "küçük sabır pratiği", "iç sakinlik"],
              "Başarı Psikolojisi ve Motivasyon": ["tekrarın gücü", "görünmeyen disiplin", "erken vazgeçme", "küçük alışkanlıklar"],
              "Teknolojinin Karanlık Yüzü": ["dikkat ekonomisi", "veri izleri", "bildirim bağımlılığı", "algoritmik yönlendirme"],
              "Mitoloji ve Efsanelerin Kökenleri": ["ortak insan korkuları", "kahraman yolculuğu", "doğaya anlam verme", "yasak bilgi efsaneleri"],
              "İnanılmaz Bilimsel Keşifler": ["hatalardan doğan keşifler", "görünmeyeni gösteren araçlar", "merakın etkisi", "eski soruya yeni bakış"],
              "Tuhaf ve Enteresan Yasalar": ["kuralların arkasındaki hikaye", "kültür farkı", "şehir efsanesi sanılan kurallar", "günlük davranışların anlamı"],
          }

          CURATED = {
              "Şok Edici Psikolojik Gerçekler": [
                  "Beyninin bazen gerçeği değil, tanıdık olanı seçtiğini biliyor musun? Bir cümleyi ne kadar sık duyarsan, ona inanman o kadar kolaylaşır. Bu yüzden tekrar eden fikirler zihninde güçlü görünür. Ama tanıdık olmak doğru olmak demek değildir. Bugün bir şeye inanmadan önce kendine şunu sor: Bunu gerçekten biliyor muyum, yoksa sadece çok mu duydum?",
                  "Zihnin eksik bilgiyi sessizce tamamlar. Kısa bir mesajı, bir yüz ifadesini veya tek bir bakışı görür ve hemen hikaye kurar. Çoğu yanlış anlaşılma olaydan değil, zihnin eklediği anlamdan büyür. Bu yüzden hızlı karar vermeden önce dur. Belki gördüğün şey gerçek değil, beyninin boşluğu doldurma şeklidir."
              ],
              "Bilinmeyen İnsan Davranışları": [
                  "İnsanların kalabalıkta daha az yardım ettiğini fark ettin mi? Çünkü herkes sorumluluğu bir başkasının alacağını düşünür. Etrafta insan sayısı arttıkça ilk adımı atmak daha zorlaşır. Ama sessizliği bozan kişi çoğu zaman olayı değiştirir. Bir gün böyle bir an yaşarsan kalabalığa değil, kendi kararına bak. Bazen tek hareket, herkesin beklediği cesareti başlatır."
              ],
              "Çözülememiş Tarihi Gizemler": [
                  "Geçmiş her zaman kitaplarda yazdığı kadar net değildir. Bazı yerleşimler bir anda sessizleşir, bazı yazıtlar hâlâ tam okunamaz, bazı yolculukların sonu kayıtlarda kaybolur. Bu gizemleri ilginç yapan şey sadece cevap eksikliği değildir. Her biri bize insanlığın ne kadar kırılgan bir hafızaya sahip olduğunu gösterir. Belki de tarih, eksik sayfaları hâlâ aranan büyük bir arşivdir."
              ],
              "Uzayın Korkunç Sırları": [
                  "Uzay boş gibi görünür ama aslında akıl almaz güçlerle doludur. Bir yıldız doğar, milyonlarca yıl parlar ve sonunda çevresindeki her şeyi değiştirecek bir patlamayla yok olabilir. Biz ise bu dev sahnenin küçük bir köşesinde yaşıyoruz. Korkutucu olan sadece uzaklık değil, ne kadar az şey bildiğimizdir. Gökyüzüne baktığında yalnızca yıldız görme; orada cevabını bekleyen dev sorular var."
              ],
              "Günlük Hayatta Stoacı Felsefe": [
                  "Seni yoran şey çoğu zaman olayın kendisi değil, ona verdiğin anlamdır. Kontrol edemediğin şeyi zorladıkça zihnin daha çok yorulur. Ama kendi tepkini seçtiğinde güç geri gelir. Bugün biri seni sinirlendirirse hemen cevap verme. Önce dur, nefes al ve şunu sor: Bu benim kontrolümde mi? Cevap hayırsa, enerjini geri al."
              ],
              "Başarı Psikolojisi ve Motivasyon": [
                  "Başarının en gizli tarafı motivasyon değil, tekrar gücüdür. Motivasyon gelir ve gider ama küçük alışkanlıklar sessizce karakterini değiştirir. Her gün biraz daha iyi olmak, uzun vadede büyük fark yaratır. İnsanlar sonucu görünce şans sanır; görünmeyen yerde ise yüzlerce küçük seçim vardır. Bugün büyük bir plan yapma. Sadece yarın da tekrarlayabileceğin küçük bir adım at."
              ],
              "Teknolojinin Karanlık Yüzü": [
                  "Telefonun seni dinleyip dinlemediği kadar önemli bir soru daha var: Sen ona ne kadar veri veriyorsun? Her tıklama, izleme süren ve kaydırmadan geçtiğin içerik bir davranış izine dönüşür. Teknoloji seni tanımak zorunda değildir; bir sonraki hareketini tahmin etmesi yeterlidir. En korkutucu taraf kameralar değil, alışkanlıklarının ölçülmesidir. Bugün bir uygulamayı açmadan önce sor: Bunu ben mi seçtim, bana mı seçtirildi?"
              ],
              "Mitoloji ve Efsanelerin Kökenleri": [
                  "Mitolojiler sadece eski masallar değildir. İnsanların korkularını, umutlarını ve doğayı anlama çabasını taşır. Gök gürültüsü bir tanrının öfkesi, fırtına ise bilinmeyen bir gücün işareti gibi anlatılırdı. Çünkü insan, anlamadığı şeye hikaye vererek dayanır. Bugün de aynı şeyi farklı kelimelerle yapıyoruz. Belki efsaneler geçmişin kalıntısı değil, insan zihninin aynasıdır."
              ],
              "İnanılmaz Bilimsel Keşifler": [
                  "Bilimde büyük keşifler bazen bir hata gibi başlar. Beklenmeyen bir sonuç, yanlış görünen bir iz veya tutmayan bir deney yeni bir kapı açabilir. Çünkü bilim sadece doğru cevabı bulmak değil, şaşırmayı ciddiye almaktır. Bugün kullandığımız birçok fikir, birinin garip görünen bir ayrıntıyı görmezden gelmemesiyle gelişti. Bu yüzden merak küçük görünse de dünyayı değiştirebilir. Bir soruyu önemsemek, keşfin ilk adımıdır."
              ],
              "Tuhaf ve Enteresan Yasalar": [
                  "Dünyada bazı kurallar ilk duyduğunda şaka gibi gelir. Ama çoğunun arkasında unutulmuş bir olay, eski bir alışkanlık veya toplumun çözmeye çalıştığı gerçek bir sorun vardır. Bir yerde sessizlik, başka bir yerde hayvanlar, başka bir yerde kamusal düzen yasa konusu olabilir. Bu kurallar bize sadece hukuku değil, insanların neye önem verdiğini de gösterir. Garip görünen bir kural bazen bir toplumun hafızasını taşır."
              ],
          }

          def prompt_for(niche, angle):
              return f"""
          Türkçe YouTube Shorts için tek parça konuşma metni yaz.
          Konu: {niche}
          Özgün açı: {angle}
          Süre hedefi: 30-40 saniye.
          Kelime hedefi: 55-75 kelime.

          Kurallar:
          - Tek ana fikir üzerinden ilerle.
          - Cümleler birbirine anlamca bağlı olsun.
          - Rastgele ülke, olay veya bilgi listesi yapma.
          - Boş clickbait, çeviri kokan ifade, düşük cümle ve anlatım bozukluğu kullanma.
          - Kesin sayı, ceza, yasa veya tıbbi iddia uydurma.
          - En fazla iki soru cümlesi kullan.
          - Son cümle doğal bir yorum veya takip çağrısı olsun.
          - Sadece konuşulacak metni yaz.
          """.strip()

          def clean(text):
              text = re.sub(r"[*#_`>\[\]{}]", "", text or "")
              text = re.sub(r"(?i)^(senaryo|metin|cevap|script|text|answer)\s*:\s*", "", text.strip())
              return re.sub(r"\s+", " ", text).strip().strip('"').strip("'")

          def issues(text, niche):
              t = clean(text)
              low = t.lower()
              words = t.split()
              out = []
              if len(words) < 50 or len(words) > 86:
                  out.append(f"word_count={len(words)}")
              if t.count(":") > 1:
                  out.append("too_many_colons")
              if t.count("?") > 2:
                  out.append("too_many_questions")
              if re.search(r"^[^.!?]{0,28}:\s*", t):
                  out.append("headline_colon_opening")
              if re.search(r"\b(yok|değil)\b.{0,35}\b(ama|fakat)\b.{0,45}\?", low):
                  out.append("contradictory_question")
              if any(x in low for x in ["vergi suçu", "oburluk yasası", "hayatınızı değiştirecek:"]):
                  out.append("known_bad_phrase")
              countries = ["almanya", "japonya", "ingiltere", "amerika", "arizona", "türkiye"]
              if sum(1 for c in countries if c in low) > 3:
                  out.append("random_country_list")
              sentence_count = len([s for s in re.split(r"[.!?]+", t) if s.strip()])
              if sentence_count < 5:
                  out.append("too_few_sentences")
              return out

          def fallback_script(niche):
              script = clean(random.choice(CURATED.get(niche) or sum(CURATED.values(), [])))
              runner.main.logger.warning("Using curated original scenario fallback for niche: %s", niche)
              return script

          def generate_script(niche):
              best = ""
              best_count = 999
              try:
                  from g4f.client import Client
                  client = Client()
              except Exception as exc:
                  runner.main.logger.warning("generator unavailable, using curated fallback: %s", exc)
                  return fallback_script(niche)

              for attempt in range(7):
                  angle = random.choice(SCENARIOS.get(niche) or ["tek ana fikir"])
                  try:
                      response = client.chat.completions.create(
                          model="gpt-4",
                          messages=[{"role": "user", "content": prompt_for(niche, angle)}],
                          timeout=60,
                      )
                      script = clean(response.choices[0].message.content)
                      bad = issues(script, niche)
                      if len(bad) < best_count:
                          best = script
                          best_count = len(bad)
                      if not bad:
                          runner.main.logger.info("Accepted original scenario script after %d try: %s", attempt + 1, angle)
                          return script
                      runner.main.logger.warning("Rejected weak script; regenerating. issues=%s angle=%s", ",".join(bad), angle)
                  except Exception as exc:
                      runner.main.logger.warning("Script generation try %d failed; regenerating/fallback: %s", attempt + 1, exc)

              if best and best_count <= 1:
                  runner.main.logger.warning("Using closest script after regeneration guard. issues=%d", best_count)
                  return best
              return fallback_script(niche)

          original_write_meta = runner.write_meta
          def write_meta(meta):
              meta["prompt_style"] = "regenerate_until_clean_original_scenario_guard"
              meta["script_quality_guard"] = {
                  "regenerates_bad_online_scripts": True,
                  "uses_original_scenario_angles": True,
                  "rejects_random_lists": True,
                  "rejects_contradictory_questions": True,
                  "uses_curated_fallback_when_needed": True,
              }
              original_write_meta(meta)

          runner.generate_script = generate_script
          runner.fallback_script = fallback_script
          runner.write_meta = write_meta
          asyncio.run(runner.run())
          PY

      - name: 📝 Durum dosyası oluştur
        if: always()
        run: |
          mkdir -p runtime-status
          echo "# Last run" > runtime-status/last-run.md
          echo "result=${{ steps.run_bot.outcome }}" >> runtime-status/last-run.md
          echo "run_id=${GITHUB_RUN_ID}" >> runtime-status/last-run.md
          echo "commit=${GITHUB_SHA}" >> runtime-status/last-run.md
          echo "video=$(test -f generated-videos/latest_short.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "thumbnail=$(test -f generated-videos/latest_thumbnail.jpg && echo yes || echo no)" >> runtime-status/last-run.md
          echo "meta=$(test -f generated-videos/latest_meta.json && echo yes || echo no)" >> runtime-status/last-run.md
          echo "voice=$(test -f voiceover.mp3 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "log=$(test -f bot.log && echo yes || echo no)" >> runtime-status/last-run.md

      - name: Commit generated video and status
        if: always()
        continue-on-error: true
        uses: EndBug/add-and-commit@v9
        with:
          add: 'generated-videos runtime-status'
          message: 'ci: save generated short output [skip ci]'
          default_author: github_actions
          pull: '--rebase --autostash'

      - name: 📦 Logları ve çıktıları sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-generator-output
          path: |
            bot.log
            final_shorts.mp4
            voiceover.mp3
            thumbnail.jpg
            generated-videos/latest_short.mp4
            generated-videos/latest_thumbnail.jpg
            generated-videos/latest_first_frame.jpg
            generated-videos/latest_preview.gif
            generated-videos/latest_meta.json
            generated-videos/video_compat_report.txt
            runtime-status/last-run.md
            runtime-status/video-meta.json
          if-no-files-found: ignore

      - name: Fail workflow if bot failed
        if: steps.run_bot.outcome != 'success'
        run: exit 1
