name: Viral Shorts Generator

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'runtime-status/**'
      - 'generated-videos/**'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4

      - name: 🐍 Python ortamını kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup secrets
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" > .env
          echo "YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}" >> .env
          echo "${CLIENT_SECRETS_JSON}" > client_secrets.json

      - name: Improve Turkish script quality rules
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('turkish_upload_runner.py')
          s = p.read_text(encoding='utf-8')
          old_prompt = '''def build_prompt(niche: str) -> str:
              return f"""
          Sen viral YouTube Shorts metinleri yazan bir uzmansın.
          Konu: {niche}
          Aşağıdaki kurallara uygun, 30-40 saniyelik bir TÜRKÇE metin yaz:
          1. İlk cümle şok edici bir soru veya çarpıcı bir gerçekle başlamalı.
          2. Orta kısımda kısa, vurucu cümlelerle ilginç bilgiler ver.
          3. Son cümle güçlü bir call-to-action içersin.
          4. Emoji, sahne yönü, efekt YOK. Sadece konuşulacak metin.
          Yalnızca metni döndür.
          """.strip()
          '''
          new_prompt = '''def build_prompt(niche: str) -> str:
              return f"""
          Sen Türkçe YouTube Shorts için güçlü ama düzgün anlatımlı metin yazan bir editörsün.
          Konu: {niche}

          30-40 saniyelik, 55-75 kelimelik, tek parça TÜRKÇE konuşma metni yaz.

          Zorunlu yapı:
          1. İlk cümle doğal bir merak cümlesi olsun; boş clickbait kullanma.
          2. Metin tek ana fikre bağlı ilerlesin; rastgele ülke, olay veya bilgi listesi gibi sıralama yapma.
          3. Her cümle bir önceki cümleye anlamca bağlansın; ani konu atlaması olmasın.
          4. Bir iddia söyledikten sonra hemen bağlamını ver; havada kalan soru bırakma.
          5. Son cümle kısa ve doğal bir yorum ya da takip çağrısı olsun.

          Kesin yasaklar:
          - Klişe iki noktalı girişler kullanma.
          - Kendi içinde çelişen soru cümleleri kurma.
          - Başlık gibi başlayıp cümleye bağlanmayan ifadeler kullanma.
          - Aynı metinde üçten fazla soru işareti kullanma.
          - Almanya, Japonya, İngiltere gibi kopuk ülke listeleri yapma.
          - Kesin sayı, ceza, yasa veya tıbbi iddia uydurma.
          - Anlatım bozukluğu, düşük cümle, çeviri kokan ifade ve gereksiz iki nokta kullanımı yapma.
          - Emoji, sahne yönü, markdown, başlık veya açıklama yazma.

          Sadece konuşulacak metni döndür.
          """.strip()
          '''
          if old_prompt in s:
              s = s.replace(old_prompt, new_prompt, 1)
          old_accept = '''if 52 <= words <= 82:
                          return script'''
          new_accept = '''bad = script.count(':') > 1 or script.count('?') > 3 or 'Hayatınızı değiştirecek:' in script
                      country_hits = sum(1 for w in ['almanya', 'japonya', 'ingiltere', 'arizona', 'türkiye'] if w in script.lower())
                      if country_hits > 3:
                          bad = True
                      if 52 <= words <= 82 and not bad:
                          return script
                      if bad:
                          main.logger.warning('Script rejected by grammar and logic guard')'''
          if old_accept in s:
              s = s.replace(old_accept, new_accept, 1)
          s = s.replace('"prompt_style": "general_viral_turkish_quality_guard_with_offline_fallback"', '"prompt_style": "story_arc_grammar_logic_guard_with_curated_fallback"')
          p.write_text(s, encoding='utf-8')
          PY

      - name: 🤖 Botu çalıştır
        id: run_bot
        continue-on-error: true
        run: python turkish_upload_runner.py

      - name: 📝 Durum dosyası oluştur
        if: always()
        run: |
          mkdir -p runtime-status
          echo "# Last run" > runtime-status/last-run.md
          echo "result=${{ steps.run_bot.outcome }}" >> runtime-status/last-run.md
          echo "run_id=${GITHUB_RUN_ID}" >> runtime-status/last-run.md
          echo "commit=${GITHUB_SHA}" >> runtime-status/last-run.md
          echo "video=$(test -f generated-videos/latest_short.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "thumbnail=$(test -f generated-videos/latest_thumbnail.jpg && echo yes || echo no)" >> runtime-status/last-run.md
          echo "meta=$(test -f generated-videos/latest_meta.json && echo yes || echo no)" >> runtime-status/last-run.md
          echo "voice=$(test -f voiceover.mp3 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "log=$(test -f bot.log && echo yes || echo no)" >> runtime-status/last-run.md

      - name: Commit generated video and status
        if: always()
        continue-on-error: true
        uses: EndBug/add-and-commit@v9
        with:
          add: 'generated-videos runtime-status'
          message: 'ci: save generated short output [skip ci]'
          default_author: github_actions
          pull: '--rebase --autostash'

      - name: 📦 Logları ve çıktıları sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-generator-output
          path: |
            bot.log
            final_shorts.mp4
            voiceover.mp3
            thumbnail.jpg
            generated-videos/latest_short.mp4
            generated-videos/latest_thumbnail.jpg
            generated-videos/latest_first_frame.jpg
            generated-videos/latest_preview.gif
            generated-videos/latest_meta.json
            generated-videos/video_compat_report.txt
            runtime-status/last-run.md
            runtime-status/video-meta.json
          if-no-files-found: ignore

      - name: Fail workflow if bot failed
        if: steps.run_bot.outcome != 'success'
        run: exit 1
