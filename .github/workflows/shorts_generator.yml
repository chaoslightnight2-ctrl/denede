name: Viral Shorts Generator

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'runtime-status/**'
  schedule:
    - cron: '0 */6 * * *'   # Her 6 saatte bir
  workflow_dispatch:         # Manuel tetikleme

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4

      - name: 🐍 Python ortamını kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick
          # ImageMagick güvenlik politikasını düzelt (metin yazmaya izin ver)
          sudo sed -i 's/rights="none"/rights="read|write"/g' /etc/ImageMagick-6/policy.xml
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup secrets
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" > .env
          echo "YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}" >> .env
          echo "${CLIENT_SECRETS_JSON}" > client_secrets.json

      - name: 🤖 Botu çalıştır
        id: run_bot
        continue-on-error: true
        run: python horror_runner.py

      - name: 📝 Durum dosyası oluştur
        if: always()
        run: |
          mkdir -p runtime-status
          echo "# Last run" > runtime-status/last-run.md
          echo "result=${{ steps.run_bot.outcome }}" >> runtime-status/last-run.md
          echo "run_id=${GITHUB_RUN_ID}" >> runtime-status/last-run.md
          echo "commit=${GITHUB_SHA}" >> runtime-status/last-run.md
          echo "video=$(test -f final_shorts.mp4 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "voice=$(test -f voiceover.mp3 && echo yes || echo no)" >> runtime-status/last-run.md
          echo "log=$(test -f bot.log && echo yes || echo no)" >> runtime-status/last-run.md

      - name: Commit runtime status
        if: always()
        continue-on-error: true
        uses: EndBug/add-and-commit@v9
        with:
          add: 'runtime-status/last-run.md'
          message: 'ci: record shorts status [skip ci]'
          default_author: github_actions
          pull: '--rebase --autostash'

      - name: 📦 Logları ve çıktıları sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-generator-output
          path: |
            bot.log
            final_shorts.mp4
            voiceover.mp3
            runtime-status/last-run.md
          if-no-files-found: ignore

      - name: Fail workflow if bot failed
        if: steps.run_bot.outcome != 'success'
        run: exit 1
